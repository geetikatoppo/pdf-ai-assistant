<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI PDF Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-black text-white p-4 text-xl font-bold text-center">
    📄 AI PDF Assistant
  </nav>

  <div class="max-w-3xl mx-auto mt-10 space-y-6">

    <!-- Upload Section -->
    <div class="bg-white shadow-lg rounded-2xl p-6">
      <h2 class="text-xl font-semibold mb-4">Upload PDF</h2>

      <input type="file" id="pdfFile" class="mb-4">
      
      <button onclick="uploadPDF()" 
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Upload
      </button>

      <p id="uploadStatus" class="mt-3 text-sm text-gray-600"></p>
    </div>

    <!-- Ask Section -->
  <!-- Chat Section -->
<div class="bg-white shadow-lg rounded-2xl p-6">
  <h2 class="text-xl font-semibold mb-4">Chat with PDF</h2>

  <!-- Chat Box -->
  <div id="chatBox" class="h-80 overflow-y-auto bg-gray-100 rounded-lg p-3 space-y-2 mb-4"></div>

  <!-- Input -->
  <div class="flex gap-2">
    <input id="question" 
      class="flex-1 border rounded-lg p-2"
      placeholder="Ask something...">

    <button onclick="askQuestion()" 
      class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
      Send
    </button>
  </div>
</div>

  </div>

  <script>
    async function uploadPDF() {
      const file = document.getElementById("pdfFile").files[0];
      const formData = new FormData();
      formData.append("file", file);

      document.getElementById("uploadStatus").innerText = "Uploading...";

      const res = await fetch("http://127.0.0.1:8001/upload-pdf", {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      document.getElementById("uploadStatus").innerText = data.message;
    }

    async function askQuestion() {
  const questionInput = document.getElementById("question");
  const chatBox = document.getElementById("chatBox");

  const question = questionInput.value.trim();
  if (!question) return;

  // User message
  chatBox.innerHTML += `
    <div style="text-align:right;">
      <span style="background:#3b82f6;color:white;padding:8px 12px;border-radius:10px;">
        ${question}
      </span>
    </div>
  `;

  questionInput.value = "";

  // Loading
  chatBox.innerHTML += `
    <div id="loading">Thinking...</div>
  `;

  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch("http://127.0.0.1:8001/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question })
    });

    const data = await res.json();

    document.getElementById("loading").remove();

    // AI response
    chatBox.innerHTML += `
      <div style="text-align:left;">
        <span style="background:#e5e7eb;padding:8px 12px;border-radius:10px;">
          ${data.answer}
        </span>
      </div>
    `;

  } catch (error) {
    document.getElementById("loading").innerText = "Error...";
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}
    
  </script>

</body>
</html>
