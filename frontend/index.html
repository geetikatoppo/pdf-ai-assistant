<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI PDF Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-black text-white p-4 text-xl font-bold text-center">
    📄 AI PDF Assistant
  </nav>

  <div class="max-w-3xl mx-auto mt-10 space-y-6">

    <!-- Upload Section -->
    <div class="bg-white shadow-lg rounded-2xl p-6">
      <h2 class="text-xl font-semibold mb-4">Upload PDF</h2>

      <input type="file" id="pdfFile" class="mb-4">
      
      <button onclick="uploadPDF()" 
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Upload
      </button>

      <p id="uploadStatus" class="mt-3 text-sm text-gray-600"></p>
    </div>

    <!-- Ask Section -->
    <div class="bg-white shadow-lg rounded-2xl p-6">
      <h2 class="text-xl font-semibold mb-4">Ask Question</h2>

      <div class="flex gap-2">
        <input id="question" 
          class="flex-1 border rounded-lg p-2"
          placeholder="Ask something about your PDF...">

        <button onclick="askQuestion()" 
          class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
          Ask
        </button>
      </div>

      <div id="responseBox" 
        class="mt-4 p-4 bg-gray-100 rounded-lg hidden">
      </div>
    </div>

  </div>

  <script>
    async function uploadPDF() {
      const file = document.getElementById("pdfFile").files[0];
      const formData = new FormData();
      formData.append("file", file);

      document.getElementById("uploadStatus").innerText = "Uploading...";

      const res = await fetch("http://127.0.0.1:8001/upload-pdf", {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      document.getElementById("uploadStatus").innerText = data.message;
    }

    async function askQuestion() {
      const question = document.getElementById("question").value;

      const res = await fetch("http://127.0.0.1:8001/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ question })
      });

      const data = await res.json();

      const box = document.getElementById("responseBox");
      box.classList.remove("hidden");
      box.innerText = data.answer;
    }
  </script>

</body>
</html>
